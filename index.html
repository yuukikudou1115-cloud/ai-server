<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>発明AIコーチ</title>

<style>

body{
font-family:sans-serif;
margin:40px;
background:#f2f4f8;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

textarea{
width:100%;
height:120px;
}

button{
margin-top:10px;
padding:10px 20px;
font-size:16px;
}

.result{
margin-top:20px;
background:#eef3ff;
padding:20px;
white-space:pre-line;
}

</style>

</head>

<body>

<div class="container">

<h1>発明AIコーチ</h1>

<p>あなたの発明を書いてください</p>

<textarea id="idea"></textarea>

<br>

<button onclick="askAI()">AIに相談</button>

<div id="result" class="result"></div>

</div>

<script>

async function askAI(){

let idea=document.getElementById("idea").value;

let response=await fetch(
"https://ai-server-1-69pd.onrender.com/api",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({idea:idea})
});

let data=await response.json();

document.getElementById("result").innerText=data.reply;

}

</script>

</body>
</html>
