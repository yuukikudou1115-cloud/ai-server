<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>発明アドバイスAI</title>

<style>
body{
font-family: sans-serif;
background:#f4f6fb;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:600px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:120px;
font-size:16px;
padding:10px;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
margin-top:10px;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#45a049;
}

#result{
margin-top:20px;
text-align:left;
background:#f0f3ff;
padding:15px;
border-radius:8px;
}
</style>

</head>

<body>

<div class="container">

<h1>発明アドバイスAI</h1>

<p>あなたの発明アイデアを書いてください</p>

<textarea id="idea" placeholder="例：自動で宿題を整理してくれるスマートペン"></textarea>

<br>

<button onclick="askAI()">AIに相談</button>

<div id="result"></div>

</div>

<script>

async function askAI(){

const idea=document.getElementById("idea").value;

document.getElementById("result").innerText="AIが考えています...";

const res=await fetch("https://ai-server-1-69pd.onrender.com/ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({idea:idea})
});

const data=await res.json();

document.getElementById("result").innerText=data.advice;

}

</script>

</body>
</html>
